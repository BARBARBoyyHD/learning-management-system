<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Join Game - Quizizz Clone</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101122",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .pattern-bg {
            background-color: #101122;
            background-image: radial-gradient(#6467f2 0.5px, transparent 0.5px), radial-gradient(#6467f2 0.5px, #101122 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.15;
        }
    </style>
</head>
<body class="font-display bg-background-dark text-slate-100 min-h-screen flex flex-col relative overflow-hidden">
<!-- Background Pattern -->
<div class="absolute inset-0 pattern-bg pointer-events-none"></div>
<!-- Top Branding -->
<header class="relative z-10 flex items-center justify-between px-6 py-4 lg:px-12">
<div class="flex items-center gap-3">
<div class="size-10 bg-primary rounded-lg flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-2xl">rocket_launch</span>
</div>
<div>
<h2 class="text-white text-xl font-bold leading-tight tracking-tight">Quizizz Clone</h2>
<p class="text-primary/80 text-xs font-medium uppercase tracking-widest">LearnWeb LMS</p>
</div>
</div>
<button class="flex items-center justify-center rounded-full size-10 bg-slate-800 text-slate-300 hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">help</span>
</button>
</header>
<main class="relative z-10 flex-1 flex items-center justify-center p-4">
<div class="w-full max-w-[480px] space-y-6">
<!-- Main Join Card -->
<div class="bg-slate-900/80 backdrop-blur-xl border border-slate-800 p-8 rounded-xl shadow-2xl">
<div class="text-center mb-8">
<h1 class="text-3xl font-bold text-white mb-2">Ready to Play?</h1>
<p class="text-slate-400">Enter your game code and name to begin</p>
</div>
<div class="space-y-6">
<!-- Game Code Section -->
<div class="space-y-3">
<label class="block text-sm font-semibold text-slate-300 ml-1">Game Code</label>
<fieldset class="flex justify-between gap-2">
<input class="flex h-14 w-full text-center bg-slate-800 border-2 border-slate-700 focus:border-primary focus:ring-0 rounded-lg text-xl font-bold text-white" maxlength="1" placeholder="•" type="text"/>
<input class="flex h-14 w-full text-center bg-slate-800 border-2 border-slate-700 focus:border-primary focus:ring-0 rounded-lg text-xl font-bold text-white" maxlength="1" placeholder="•" type="text"/>
<input class="flex h-14 w-full text-center bg-slate-800 border-2 border-slate-700 focus:border-primary focus:ring-0 rounded-lg text-xl font-bold text-white" maxlength="1" placeholder="•" type="text"/>
<input class="flex h-14 w-full text-center bg-slate-800 border-2 border-slate-700 focus:border-primary focus:ring-0 rounded-lg text-xl font-bold text-white" maxlength="1" placeholder="•" type="text"/>
<input class="flex h-14 w-full text-center bg-slate-800 border-2 border-slate-700 focus:border-primary focus:ring-0 rounded-lg text-xl font-bold text-white" maxlength="1" placeholder="•" type="text"/>
<input class="flex h-14 w-full text-center bg-slate-800 border-2 border-slate-700 focus:border-primary focus:ring-0 rounded-lg text-xl font-bold text-white" maxlength="1" placeholder="•" type="text"/>
</fieldset>
</div>
<!-- Name Input Section -->
<div class="space-y-3">
<label class="block text-sm font-semibold text-slate-300 ml-1">Your Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">person</span>
<input class="w-full h-14 pl-12 pr-4 bg-slate-800 border-2 border-slate-700 focus:border-primary focus:ring-0 rounded-lg text-lg text-white placeholder:text-slate-600" placeholder="Enter your nickname" type="text"/>
</div>
</div>
<!-- Join Button -->
<button class="w-full h-16 bg-primary hover:bg-primary/90 text-white font-bold text-xl rounded-xl shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-3 active:scale-95 group">
                        JOIN GAME
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
<!-- Secondary Actions -->
<div class="flex flex-col sm:flex-row gap-4 justify-between items-center px-2">
<div class="flex items-center gap-2 text-slate-400 text-sm">
<span class="material-symbols-outlined text-base">group</span>
<span>42 students waiting</span>
</div>
<button class="text-sm font-medium text-primary hover:text-primary/80 flex items-center gap-1">
<span class="material-symbols-outlined text-base">qr_code_scanner</span>
                    Scan QR Code
                </button>
</div>
</div>
</main>
<!-- Decorative Elements -->
<div class="absolute -bottom-24 -left-24 size-64 bg-primary/20 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute -top-24 -right-24 size-64 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<footer class="relative z-10 p-6 text-center text-slate-500 text-xs">
<p>© 2024 LearnWeb LMS Ecosystem. High-speed educational connectivity.</p>
</footer>
</body></html>
