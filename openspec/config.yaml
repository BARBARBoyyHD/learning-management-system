schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
context: |
  ## Project: Quizizz Clone (Lite Version) - LearnWeb LMS

  ### Tech Stack (Latest Versions - 2026)
  - **Framework:** Next.js 16 (App Router) with Server Components default, Turbopack
  - **Language:** TypeScript 5.7+ (strict mode)
  - **Styling:** Tailwind CSS 4 + Shadcn/ui components (Radix UI primitives)
  - **Database:** PostgreSQL 16 with Prisma ORM v6
  - **State Management:** TanStack Query v5 for server state
  - **Forms:** React Hook Form v8 + Zod validation
  - **HTTP:** Native Fetch API
  - **Icons:** Lucide React
  - **Hosting:** Vercel (Edge Network, Blob Storage)
  - **Package Manager:** npm 11.x
  - **Testing:** Playwright (E2E) + Vitest (unit)
  - **Runtime:** React 19 with Turbopack

  ### Architecture Principles
  - Component-driven UI with reusable composable components
  - Server Components default, Client Components when needed (React 19)
  - API versioning pattern: `/api/v1/{context}/{resource}/{action}`
  - Validation everywhere: Zod schemas on client and server
  - Single source of truth: PostgreSQL as primary database
  - UUIDs as primary keys (Supabase-compatible)
  - Turbopack for fast builds and HMR (Next.js 16 default)

  ### Domain Knowledge
  - **Learning Management System** focused on interactive quizzes
  - **Two user types:**
    - Teachers (registered users with full access)
    - Students (guest users, no registration required, join via access code)
  - **5 Question Types:** Multiple Choice, Essay, Fill in the Blank, Match (Menjodohkan), Reorder
  - **JSON-based question settings** for extensibility without schema changes
  - **Auto-grading** for objective questions, manual grading for essays
  - **Real-time reporting** with scores available < 5 seconds after submission

  ### Key Business Objectives (BRD Section 2.2)
  - **BO-01:** Student onboarding < 2 minutes from entering code to starting quiz
  - **BO-02:** 5 question types on first release
  - **BO-03:** Support 1000+ concurrent quiz takers per instance
  - **BO-04:** Scores available < 5 seconds after submission

  ### Development Conventions
  - **Commits:** Conventional Commits format
  - **Code Quality:** ESLint + Prettier + Biome (optional) with Husky pre-commit hooks
  - **Type Safety:** Strict TypeScript 5.7+, no `any` types
  - **File Naming:** kebab-case for files, PascalCase for components
  - **Imports:** Absolute imports from `src/` directory
  - **Components:** Server Components by default (React 19), mark 'use client' only when needed
  - **Styling:** Tailwind CSS v4 with CSS variables for theming

  ### Project Structure
  - `src/app/` - Next.js 16 App Router (pages, layouts, API routes)
  - `src/components/` - UI components (ui/, layout/, quizzes/, questions/, forms/)
  - `src/lib/` - Utilities (prisma client, validators, API client, constants)
  - `src/hooks/` - Custom React hooks
  - `src/services/` - Business logic layer
  - `src/repositories/` - Data access layer (Prisma)
  - `src/types/` - TypeScript type definitions
  - `prisma/` - Database schema and migrations
  - `tests/` - E2E and unit tests

  ### Documentation Reference
  - **BRD (Business Requirements):** `/docs/project/01-bussiness-requirement.md`
  - **PEP (Project Execution Plan):** `/docs/project/02-project-execution-plan.md`
  - **ITA (Implementation & Architecture):** `/docs/project/03-implementation-and-architecture.md`
  - **ERD Guideline (Database Schema):** `/docs/project/04-database-erd-guideline.md`
  - **Color Guideline (Design System):** `/docs/project/05-color-guideline.md`
  - **Stitch Asset (Reference UI):** `/docs/stitch-asset/` (HTML prototypes for key screens)

  ### Design System Reference
  - **Primary Themes:**
    - Theme A (Light): Indigo `#6467f2` - Student-facing screens, Assessment Editor
    - Theme B (Dark): Deep Purple `#6a25f4` - Teacher Dashboard, Quiz screens
  - **Font:** Lexend (Google Fonts)
  - **Icons:** Material Symbols Outlined
  - **Border Radius:** 12px default
  - **Reference Screens:** See `/docs/stitch-asset/` for HTML prototypes:
    - `student-join-screen.html` - Guest student join flow
    - `teacher-dashboard.html` - Teacher main dashboard
    - `assessment-editor.html` - Quiz/assessment creation
    - `quiz-multiple-choice.html` - MC question UI
    - `quiz-essay-question.html` - Essay question UI

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
rules:
  proposal:
    - Always reference the Business Requirements Document (BRD) section when proposing features
    - Include clear scope boundaries (Must Have vs Should Have vs Nice to Have)
    - Identify dependencies on other modules
    - Consider guest student experience in all user-facing features
    - Reference specific business objectives (BO-01 through BO-04)

  design:
    - Follow the 3-layer architecture: Service Layer → Repository Layer → Database
    - Use UUIDs for all primary keys (per ERD Guideline)
    - Design for extensibility (new question types without schema changes)
    - Include error handling and edge cases
    - Reference the Implementation & Technical Architecture (ITA) document
    - For database changes, reference `/docs/project/04-database-erd-guideline.md`
    - Follow Prisma schema conventions from ERD Guideline
    - Leverage Next.js 16 features (Turbopack, improved Server Components)
    - Use React 19 patterns and conventions
    - **UI/Design:** Reference `/docs/stitch-asset/` for visual design patterns
    - **Colors:** Apply color system from `/docs/project/05-color-guideline.md`
    - Implement dual-theme support (Light: indigo #6467f2, Dark: purple #6a25f4)
    - Use Lexend font family and Material Symbols Outlined icons

  tasks:
    - Break down by module (M1-M6) as defined in BRD
    - Each task should be completable within a sprint (2 weeks max)
    - Include testing tasks (unit + integration) for each feature
    - Reference specific functional requirement IDs (e.g., FR-M1-01)
    - Consider the sprint planning from Project Execution Plan
    - Include database migration tasks for schema changes
    - Add type definition tasks for TypeScript strict compliance

  specs:
    - Map requirements to BRD sections (e.g., Section 6.2 for Auth Module)
    - Include acceptance criteria for each specification
    - Define JSON schemas for question type settings (per ERD Guideline Section 5)
    - Specify API endpoints using the versioning pattern `/api/v1/{context}/{resource}/{action}`
    - Include database schema changes when applicable
    - For database-related specs, reference `/docs/project/04-database-erd-guideline.md`
    - Follow indexing strategy from ERD Guideline Section 7
    - Include TypeScript type definitions for all new entities
    - Specify Server Component vs Client Component boundaries
    - **UI Components:** Reference stitch assets for component structure and layout
    - **Styling:** Use color tokens from Color Guideline (CSS variables)
    - **Accessibility:** Ensure WCAG 2.1 AA contrast ratios per Color Guideline Section 8
